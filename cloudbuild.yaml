substitutions:
  _SERVICE_NAME: alti-assistant-frontend
  _REGION: us-central1
  _ARTIFACT_REPO: alti-assistant
  # Override these when triggering the build, or set in trigger config
  _NEXT_PUBLIC_API_URL: https://your-api-url/api/v1

steps:
  # Build the container image
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest
      - .

  # Push the container image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --min-instances
      - "1"
      - --max-instances
      - "10"
      - --memory
      - "1Gi"
      - --cpu
      - "1"
      # Runtime env vars — secrets are injected via Secret Manager bindings below.
      # Non-secret vars can be added with --set-env-vars.
      - --set-env-vars
      - NODE_ENV=production,NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL},AUTH_TRUST_HOST=true,AUTH_URL=https://altiassistant.com
      # Bind secrets from Secret Manager (create them first):
      #   gcloud secrets create AUTH_SECRET --data-file=-
      #   gcloud secrets create NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY --data-file=-
      - --set-secrets
      - AUTH_SECRET=AUTH_SECRET:latest,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
